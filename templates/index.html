<!DOCTYPE html>
<html class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Invincible 911</title>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-6">
    <h1 class="text-3xl font-bold mb-6">Invincible 911</h1>
    <div id="chat-box" class="w-full max-w-lg bg-gray-800 p-4 rounded-lg h-96 overflow-y-auto mb-4 border border-gray-700"></div>
    <form id="chat-form" class="w-full max-w-lg flex gap-2">
        <input type="text" id="msg" class="flex-1 bg-gray-700 p-2 rounded border border-gray-600 outline-none" placeholder="Ask anything...">
        <button type="submit" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-500">Send</button>
    </form>
    <script>
        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg').value;
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<p class="mb-2"><b>You:</b> ${msg}</p>`;
            const formData = new FormData();
            formData.append('message', msg);
            const res = await fetch('/chat', { method: 'POST', body: formData });
            const data = await res.json();
            chatBox.innerHTML += `<p class="mb-2 text-blue-400"><b>Invincible 911:</b> ${data.response}</p>`;
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
